<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiz Cancillería Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stats-bar { background: #004a99; color: white; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .cat { color: #555; font-size: 0.8em; text-transform: uppercase; }
        h2 { color: #004a99; font-size: 1.2rem; }
        button { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #004a99; border-radius: 5px; cursor: pointer; background: white; color: #004a99; font-weight: bold; }
        button:hover { background: #004a99; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats-bar" id="stats">Éxito: 0% (0/0)</div>
    <div id="cat" class="cat">Cargando...</div>
    <h2 id="pregunta">Cargando...</h2>
    <div id="opciones"></div>
</div>

<script>
    let banco = [];
    let indice = 0;
    // Cargamos estadísticas y la lista de preguntas falladas (pendientes)
    let stats = JSON.parse(localStorage.getItem('quizStats')) || { aciertos: 0, total: 0 };
    let pendientes = JSON.parse(localStorage.getItem('pendientes')) || [];

    async function cargar() {
        try {
            const res = await fetch('preguntas.json');
            banco = await res.json();
            actualizarStats();
            // Elegimos la primera pregunta al azar para empezar
            indice = Math.floor(Math.random() * banco.length);
            mostrar();
        } catch (e) { document.body.innerHTML = "Error: Asegúrate de tener preguntas.json en la misma carpeta."; }
    }

    function actualizarStats() {
        const porcentaje = stats.total > 0 ? Math.round((stats.aciertos / stats.total) * 100) : 0;
        document.getElementById('stats').innerText = `Éxito: ${porcentaje}% (${stats.aciertos}/${stats.total}) - Refuerzo: ${pendientes.length}`;
        localStorage.setItem('quizStats', JSON.stringify(stats));
        localStorage.setItem('pendientes', JSON.stringify(pendientes));
    }

    function seleccionarSiguiente() {
        // Probabilidad del 40% de elegir una pregunta de la lista de falladas (si hay)
        if (pendientes.length > 0 && Math.random() < 0.4) {
            const azar = Math.floor(Math.random() * pendientes.length);
            indice = pendientes[azar];
        } else {
            // Secuencia normal (la siguiente en la lista del JSON)
            indice = (indice + 1) % banco.length;
        }
    }

    function mostrar() {
        const p = banco[indice];
        document.getElementById('cat').innerText = p.c + (pendientes.includes(indice) ? " (¡REFUERZO!)" : "");
        document.getElementById('pregunta').innerText = p.p;
        const div = document.getElementById('opciones');
        div.innerHTML = '';
        
        p.o.forEach((op, i) => {
            const btn = document.createElement('button');
            btn.innerText = op;
            btn.onclick = () => {
                stats.total++;
                if (i === p.r) {
                    stats.aciertos++;
                    alert("¡Correcto!");
                    // Si la teníamos en pendientes, la quitamos porque ya la aprendiste
                    if (pendientes.includes(indice)) {
                        pendientes = pendientes.filter(id => id !== indice);
                    }
                } else {
                    alert("Incorrecto, la respuesta era: " + p.o[p.r]);
                    // Si fallamos y no estaba en la lista, la agregamos
                    if (!pendientes.includes(indice)) {
                        pendientes.push(indice);
                    }
                }
                actualizarStats();
                seleccionarSiguiente();
                mostrar();
            };
            div.appendChild(btn);
        });
    }

    cargar();
</script>
</body>
</html>
